use_wandb: False
use_sky: False
use_dynamic: False
use_refine: False
use_metric: True
debug_mode: False

mode: 'vo' # 'vo' or 'vio'


device:
  tracker: 'cuda:0'
  mapper: 'cuda:0'

dataset:
  root: /data/wuke/DATA/2024/Waymo/Waymo_Scene32/
  module: datasets.waymo
  rgb_strip: 1

middleware:
  cov_times: 70000
  max_cov: 1e5
  max_depth: 40

output:
  save_dir: /home/server/output/DPT-LSG_output/

# 707.0912 707.0912 601.8873 183.1104
intrinsic: 
  fu: 2044.508
  fv: 2044.508
  cu: 633.2422 # cy
  cv: 979.5746 # cx
  H: 1280
  W: 1920

frontend:
  weight: /home/server/VINGS_work/DPT-LSG/ckpts/droid.pth
  image_size: [344, 616]
  buffer: 80
  filter_thresh: 1.4
  c2i: None
  # visual_only: 0 # 0 means VIO and 1 means VO.
  warm_up: 8
  beta: 0.3
  frontend_nms: 1
  keyframe_thresh: 1.0
  frontend_window: 5
  frontend_thresh: 16.0 
  frontend_radius: 2
  active_window: 12
  # CovisibleGraph
  max_factors: 48
  far_threshold: 0.02
  inac_range: 3
  mask_threshold: -1.0
  skip_edge: [-4,-5,-6]
  translation_threshold: 0.5
  # Vis.
  show_plot: False

adc_args:
  accum_thresh: 0.98
training_args:
  num_keyframe: 8
  iters: 100
  lr: # Copy form 2DGS.
    _xyz_lr: 0.0001
    _rgb_lr: 0.0003
    _opacity_lr: 0.05
    _scaling_lr: 0.001
    _rotation_lr: 0.001
  loss_weights:
    rgb_loss: 1.0
    depth_loss: 1.0
    alpha_loss: 1.0  # 10.0
    normal_loss: 0.1 # 0.05
    dist_loss: 0.0


use_vis: True
