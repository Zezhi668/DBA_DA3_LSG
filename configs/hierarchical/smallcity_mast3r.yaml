use_wandb: False
use_sky: False
use_dynamic: False
use_pose_refine: False
use_metric: False
debug_mode: True

mode: 'vo_mast3rslam'


device:
  tracker: 'cuda:0'
  mapper: 'cuda:0'

dataset:
  root: /home/server/dataset/small_city/
  module: datasets.hierarchical
  rgb_strip: 1

middleware:
  cov_times: 1000
  max_cov: 3e3
  max_depth: 35

output:
  save_dir: /home/server/output/DPT-LSG_output/

memory_monitor:
  enabled: True
  interval: 1

intrinsic:
  H: 690
  W: 1024
  fu: 487.09015156
  fv: 486.9700816
  cu: 345.
  cv: 512.
  resolution_scale: 1.0
  bg: 0


frontend:
  weight: /home/server/VINGS_work/DPT-LSG/ckpts/droid.pth
  image_size: [344, 616]
  buffer: 80
  filter_thresh: 2.4
  c2i: None
  warm_up: 8
  beta: 0.3
  frontend_nms: 1
  keyframe_thresh: 4.0
  frontend_window: 5
  frontend_thresh: 16.0
  frontend_radius: 2
  active_window: 12
  max_factors: 48
  far_threshold: 0.02
  inac_range: 3
  mask_threshold: -1.0
  skip_edge: [-4,-5,-6]
  translation_threshold: 0.5
  show_plot: True

mast3r_slam:
  repo_root: /home/server/VINGS_work/MASt3R-SLAM
  config: config/calib.yaml
  img_size: 512
  publish_window: 8
  save_buffer: 2500
  use_calib: True
  enable_retrieval: False
  cov_scale: 0.05
  cov_min: 1e-3
  cov_max: 3e3
  depth_min: 1e-3

adc_args:
  accum_thresh: 0.98
training_args:
  num_keyframe: 8
  iters: 50
  lr:
    _xyz_lr: 0.0001
    _rgb_lr: 0.0005
    _opacity_lr: 0.05
    _scaling_lr: 0.001
    _rotation_lr: 0.001
  loss_weights:
    rgb_loss: 1.0
    depth_loss: 1.0
    alpha_loss: 1.0
    normal_loss: 0.1
    dist_loss: 0.0

looper:
  enable: True
  detector: /home/server/VINGS_work/DPT-LSG/ckpts/lightglue
  lightglue_weight_dir: /home/server/VINGS_work/DPT-LSG/ckpts/lightglue/

use_vis: False
vis:
  bev_w2c: [[ 9.86264675e-01,  7.99505779e-02,  1.44533373e-01, -5.73378037e+01],
       [ 2.78057407e-02,  7.82189932e-01, -6.22419273e-01, 3.97714933e+01],
       [-1.62815330e-01,  6.17889000e-01,  7.69223214e-01, 14.49326822e+01],
       [ 0.00000000e+00,  0.00000000e+00,  0.00000000e+00, 1.00000000e+00]]
  bev_intrinsic_dict:
    H: 758
    W: 1372
    fu: 656.44725606860459
    fv: 656.44725606860459
    cu: 378.5
    cv: 685.5
  pose_scale: 1.0

use_storage_manager: True
storage_manager:
  distance_threshold: 30.0
